name: Validate Skill Metadata

on:
  push:
  pull_request:

jobs:
  validate-skill-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate skill metadata
        run: python scripts/validate_skill_metadata.py
